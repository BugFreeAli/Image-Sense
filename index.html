<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageSense</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Theme Configuration -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#7c3bed",
              "primary-glow": "#a76bfd",
              "obsidian": "#020204",
              "glass-border": "rgba(255, 255, 255, 0.08)",
              "glass-border-light": "rgba(0, 0, 0, 0.08)",
              "glass-bg": "rgba(2, 2, 4, 0.6)",
              "biolum": "#a855f7",
              "danger": "#FF6B6B",
              "success": "#10B981",
              "background-light": "#f7f6f8",
              "background-dark": "#0a0a0c",
              "surface-dark": "#131118",
              "surface-light": "#ffffff",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"],
              "cinema": ["Syncopate", "sans-serif"],
            },
            backgroundImage: {
              "grain": "url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.05%22/%3E%3C/svg%3E')",
               'grid-pattern': "linear-gradient(to right, #2e2839 1px, transparent 1px), linear-gradient(to bottom, #2e2839 1px, transparent 1px)",
            }
          },
        },
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7c3bed; 
      }
      
      .light ::-webkit-scrollbar-thumb {
        background: #ccc;
      }

      /* Animation Classes */
      .animate-float {
        animation: float 10s ease-in-out infinite;
      }
      @keyframes float {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(1deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }

      .animate-pulse-glow {
        animation: pulse-glow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.3; box-shadow: 0 0 20px rgba(124, 59, 237, 0.1); }
        50% { opacity: 0.8; box-shadow: 0 0 60px rgba(124, 59, 237, 0.4); }
      }
      
      @keyframes shimmer {
        0% { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }
      
      .animate-shimmer {
        background: linear-gradient(45deg,transparent 25%,rgba(68,59,84,0.2) 50%,transparent 75%,transparent 100%);
        background-size: 250% 250%;
        animation: shimmer 2s linear infinite;
      }

      .text-glow {
        text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "jspdf": "https://esm.sh/jspdf@2.5.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background-light dark:bg-obsidian text-slate-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
